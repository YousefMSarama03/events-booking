<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Book Seat - UniEvents</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/booking.css">
</head>
<body>
  <header>
    <div class="logo">🎓 UniEvents</div>
    <nav>
      <a href="index.html">Home</a>
      <a href="events.html">Events</a>
      <a href="my_bookings.html">My Bookings</a>
      <a href="login.html">Login</a>
    </nav>
  </header>

  <section class="booking">
    <h2>Book Seat for Tech Conference</h2>
    <form>
      <label for="seats">Number of Seats:</label>
      <input type="number" id="seats" name="seats" min="1" max="10">

      <label for="name">Your Name:</label>
      <input type="text" id="name" name="name">

      <label for="email">Your Email:</label>
      <input type="email" id="email" name="email">

      <button type="submit" class="btn">Confirm Booking</button>
    </form>
  </section>

  <footer>
    <p>© 2025 University Event Booking. All Rights Reserved.</p>
  </footer>
</body>
</html>
